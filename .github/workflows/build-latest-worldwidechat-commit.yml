# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Autobuilder

on:
  push:
    branches: [ main, development-1.x ]
  pull_request:
    branches: [ main, development-1.x ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: 21

      - name: Start Docker Compose (MySQL/MongoDB/PostgreSQL)
        run: bash ./dev/setup-dev-env.sh

      - name: Build with Maven
        run: mvn -B clean package -Dyamltranslator.skip=true --file pom.xml

      - name: Upload Spigot JAR
        uses: actions/upload-artifact@v7
        with:
          name: WorldwideChat-spigot
          path: spigot-target/WorldwideChat-spigot.jar
          if-no-files-found: error

      - name: Upload Paper JAR
        uses: actions/upload-artifact@v7
        with:
          name: WorldwideChat-paper
          path: paper-target/WorldwideChat-paper.jar
          if-no-files-found: error

      - name: Upload Folia JAR
        uses: actions/upload-artifact@v7
        with:
          name: WorldwideChat-folia
          path: folia-target/WorldwideChat-folia.jar
          if-no-files-found: error

      - name: Stop Docker Compose (MySQL/MongoDB/PostgreSQL)
        run: bash ./dev/takedown-dev-env.sh
