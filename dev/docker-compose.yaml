services:
  mysql:
    image: mysql/mysql-server:latest
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: cooldatabase
    ports:
      - "3306:3306"
    command: [ '--default-authentication-plugin=mysql_native_password', '--ssl=0' ]
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppassword" ]
      interval: 5s
      timeout: 5s
      retries: 24
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always
    networks:
      - backend

  mongo:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: cooldatabase
    ports:
      - "27017:27017"
    command: [ "--auth" ]
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')", "-u", "admin", "-p", "password", "--authenticationDatabase", "admin" ]
      interval: 5s
      timeout: 5s
      retries: 24
    volumes:
      - mongo-data:/data/db
    restart: always
    networks:
      - backend

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: cooldatabase
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d cooldatabase" ]
      interval: 5s
      timeout: 5s
      retries: 24
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: always
    networks:
      - backend

volumes:
  mysql-data:
  mongo-data:
  postgres-data:

networks:
  backend:
