General:
  inputMethod: auto
  enableSounds: true
  syncUserLocalization: true
  setUserLocalizationOnFirstJoin: true
  fatalAsyncTaskTimeout: 30
  objectTranslationConcurrencyLimit: 4
  prefixName: WWC
  enablebStats: true
  pluginLang: en
  updateCheckerDelay: 86400
  syncUserDataDelay: 77777
  enableDebugMode: true
Chat:
  sendActionBar: true
  sendOutgoingHoverTextChat: true
  enableBlacklist: true
  separateChatChannel:
    hoverFormat: '&o{local:wwcOrigHover}:'
    icon: globe
    format: '{prefix}{username}{suffix}:'
    force: true
  useVault: true
  chatListenerPriority: HIGHEST
  sendIncomingHoverTextChat: true
  sendTranslationChat: true
  sendPluginUpdateChat: true
